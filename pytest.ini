[pytest]
# Pytest configuration for Preceptor Feedback Bot

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=70

# Markers for organizing tests
markers =
    integration: Integration tests (may be slow)
    unit: Unit tests (fast)
    auth: Authentication and authorization tests
    conversation: Conversation flow tests
    feedback: Feedback generation tests
    dashboard: Dashboard and search tests
    survey: Survey feature tests
    slow: Slow tests
    firestore: Tests requiring Firestore connection

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info archive

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
